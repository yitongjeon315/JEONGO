<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 모바일 문서 스캐너</title>
  <!-- Google Fonts 에서 고급스러운 폰트 가져오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #090d16;
      --card-bg: #151f32;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #10b981;
      --border-color: #22314d;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
    }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1rem;
    }

    /* 모바일 앱 화면처럼 꽉 차는 레이아웃 구성 */
    .app-container {
      width: 100%;
      max-width: 480px; /* 전형적인 모바일 세로 너비 제한 */
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      padding: 1.75rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      margin-top: 1rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* 모바일 상단 앱 바 스타일 */
    .app-header {
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.25rem;
    }

    .app-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }

    .app-header .subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* 이미지 업로드 영역 최적화 */
    .upload-area {
      border: 2px dashed var(--border-color);
      border-radius: 20px;
      padding: 2rem 1rem;
      cursor: pointer;
      transition: var(--transition);
      background: rgba(21, 31, 50, 0.5);
      text-align: center;
    }

    .upload-area:active {
      transform: scale(0.98);
      border-color: var(--primary);
    }

    .upload-icon {
      font-size: 2.8rem;
      margin-bottom: 0.75rem;
      display: inline-block;
    }

    .upload-text {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.25rem;
    }

    .upload-subtext {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    #imageInput {
      display: none;
    }

    /* 미리보기 영역 */
    .preview-container {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-main);
      border-left: 4px solid var(--primary);
      padding-left: 8px;
    }

    .image-wrapper {
      width: 100%;
      height: 220px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      background: #06090f;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* 모바일 터치에 최적화된 큰 버튼 */
    .btn {
      width: 100%;
      height: 54px; /* 모바일 터치 타겟 표준 (최소 48px 이상) */
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
    }

    .btn-primary:active {
      transform: scale(0.97);
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      background: #27354a;
      color: #5e708a;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* 분석 결과 영역 */
    .analysis-container {
      display: none;
      flex-direction: column;
      width: 100%;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      padding: 1.2rem;
      border-radius: 16px;
      gap: 0.5rem;
    }

    .analysis-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-main);
      border-left: 4px solid var(--accent);
      padding-left: 8px;
      margin-bottom: 0.25rem;
    }

    .analysis-item {
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .label {
      font-weight: 700;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .value {
      color: #e2e8f0;
    }

    .highlight-value {
      color: #34d399;
      font-weight: 700;
    }

    /* OCR 결과 영역 */
    .ocr-container {
      display: none;
      flex-direction: column;
      width: 100%;
      gap: 0.75rem;
    }

    .ocr-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .ocr-buttons {
      display: flex;
      gap: 6px;
    }

    /* 모바일 맞춤 액션 버튼 */
    .btn-action {
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 700;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(34, 49, 77, 0.6);
      color: var(--text-main);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-action:active {
      transform: scale(0.95);
      background: var(--primary);
      border-color: var(--primary);
    }

    #saveBtn:active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .ocr-textbox {
      width: 100%;
      height: 150px;
      padding: 0.85rem;
      border-radius: 16px;
      background: #06090f;
      color: #e2e8f0;
      border: 1px solid var(--border-color);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      resize: none; /* 모바일 웹에서는 수동 크기 조절 방지 */
      line-height: 1.5;
      outline: none;
    }

    /* 상태 메시지 */
    .status-msg {
      font-size: 0.8rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      display: none;
      width: 100%;
      line-height: 1.4;
    }

    .status-success {
      background: rgba(16, 185, 129, 0.12);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.12);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* 푸터 */
    footer {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1rem;
    }

    /* 초소형 스마트폰 대응 반응형 */
    @media (max-width: 360px) {
      .app-container {
        padding: 1.25rem;
      }
      .app-header h1 {
        font-size: 1.5rem;
      }
      .ocr-buttons {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- 상단 앱 바 -->
    <div class="app-header">
      <h1>AI 문서 스캐너</h1>
      <p class="subtitle">사진을 선택하거나 촬영하여 글자를 추출하세요</p>
    </div>

    <!-- 이미지 업로드 터치 영역 -->
    <div class="upload-area" id="dropZone" onclick="document.getElementById('imageInput').click()">
      <span class="upload-icon">📸</span>
      <p class="upload-text">사진 선택 및 촬영</p>
      <p class="upload-subtext">눌러서 앨범 선택 또는 카메라 촬영</p>
      <!-- 모바일 환경에서 파일 선택 및 카메라 둘 다 자연스럽게 작동하도록 유도 -->
      <input type="file" id="imageInput" accept="image/*">
    </div>

    <!-- 이미지 미리보기 영역 -->
    <div class="preview-container" id="previewContainer">
      <div class="section-title">선택한 사진 미리보기</div>
      <div class="image-wrapper">
        <img id="imagePreview" src="" alt="미리보기 이미지">
      </div>
      
      <!-- 업로드 및 분석 실행 버튼 -->
      <button type="button" class="btn btn-primary" id="uploadBtn" disabled>
        <span>📤 사진 업로드 및 분석하기</span>
      </button>
    </div>

    <!-- 로딩 및 상태 메시지 알림창 -->
    <div class="status-msg" id="statusMessage"></div>

    <!-- AI 분석 결과 카드 -->
    <div class="analysis-container" id="analysisContainer">
      <div class="analysis-title">🤖 AI 문서 분석 결과</div>
      <div class="analysis-item">
        <span class="label">📄 문서 종류:</span>
        <span id="docTypeVal" class="highlight-value">-</span>
      </div>
      <div class="analysis-item">
        <span class="label">💡 한 줄 요약:</span>
        <span id="summaryVal" class="value">-</span>
      </div>
    </div>

    <!-- OCR 결과 텍스트 박스 -->
    <div class="ocr-container" id="ocrContainer">
      <div class="ocr-header">
        <div class="section-title">📄 추출된 글자</div>
        <div class="ocr-buttons">
          <button type="button" class="btn-action" id="saveBtn">
            <span>💾 저장</span>
          </button>
          <button type="button" class="btn-action" id="copyBtn">
            <span>📋 복사</span>
          </button>
        </div>
      </div>
      <textarea id="ocrResult" class="ocr-textbox" placeholder="추출된 텍스트가 여기에 표시됩니다." readonly></textarea>
    </div>
  </div>

  <footer>
    &copy; 2026 AI Mobile Scanner Project
  </footer>

  <script>
    const imageInput = document.getElementById('imageInput');
    const dropZone = document.getElementById('dropZone');
    const previewContainer = document.getElementById('previewContainer');
    const imagePreview = document.getElementById('imagePreview');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusMessage = document.getElementById('statusMessage');
    const ocrContainer = document.getElementById('ocrContainer');
    const ocrResult = document.getElementById('ocrResult');
    const copyBtn = document.getElementById('copyBtn');
    const saveBtn = document.getElementById('saveBtn');
    const analysisContainer = document.getElementById('analysisContainer');
    const docTypeVal = document.getElementById('docTypeVal');
    const summaryVal = document.getElementById('summaryVal');

    let selectedFile = null;
    let currentAnalysis = null;

    // 파일 선택 이벤트
    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      handleFileSelection(file);
    });

    // 드래그 앤 드롭 지원 (태블릿/PC 대응)
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      handleFileSelection(file);
    });

    // 파일 선택 처리 함수
    function handleFileSelection(file) {
      if (!file) return;

      // 이미지 파일 검증
      if (!file.type.startsWith('image/')) {
        showStatus('이미지 파일만 선택할 수 있습니다.', 'error');
        return;
      }

      selectedFile = file;
      currentAnalysis = null;
      
      // 브라우저 로컬 미리보기 생성
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.src = e.target.result;
        previewContainer.style.display = 'flex';
        uploadBtn.disabled = false;
        
        // 이전 상태 초기화
        ocrContainer.style.display = 'none';
        analysisContainer.style.display = 'none';
        ocrResult.value = '';
        docTypeVal.textContent = '-';
        summaryVal.textContent = '-';
        resetUploadButton();
        hideStatus();
        
        // 미리보기 화면으로 부드럽게 스크롤
        previewContainer.scrollIntoView({ behavior: 'smooth' });
      };
      reader.readAsDataURL(file);
    }

    // 업로드 버튼 클릭 이벤트
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append('image', selectedFile);

      // OCR 분석 상태 표시
      uploadBtn.disabled = true;
      uploadBtn.innerHTML = '<span>⏳ 글자를 읽는 중입니다...</span>';
      ocrContainer.style.display = 'none';
      analysisContainer.style.display = 'none';
      showStatus('사진을 분석하는 중입니다. 잠시만 기다려 주세요...', 'success');

      try {
        const response = await fetch('/upload', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          showStatus('사진 분석이 완료되었습니다!', 'success');
          imagePreview.src = result.imageUrl;
          uploadBtn.innerHTML = '<span>✅ 분석 완료</span>';
          
          // OCR 결과 표시
          ocrResult.value = result.text.trim() || '추출된 글자가 없습니다. 글자가 선명하게 보이도록 다시 찍어주세요.';
          ocrContainer.style.display = 'flex';

          // 분석 결과 표시
          if (result.analysis) {
            currentAnalysis = result.analysis;
            docTypeVal.textContent = `${result.analysis.docType}로 보입니다.`;
            summaryVal.textContent = result.analysis.summary;
            analysisContainer.style.display = 'flex';
          }
          
          // 분석 결과 화면으로 스크롤
          setTimeout(() => {
            analysisContainer.scrollIntoView({ behavior: 'smooth' });
          }, 100);
        } else {
          showStatus(result.message || '업로드 또는 분석에 실패했습니다.', 'error');
          resetUploadButton();
        }
      } catch (error) {
        console.error('Error:', error);
        showStatus('서버와 통신 중 에러가 발생했습니다.', 'error');
        resetUploadButton();
      }
    });

    // 복사 버튼 클릭 이벤트
    copyBtn.addEventListener('click', async () => {
      const textToCopy = ocrResult.value;
      if (!textToCopy) return;

      try {
        await navigator.clipboard.writeText(textToCopy);
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<span>✅ 복사됨</span>';
        
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
        }, 1500);
      } catch (err) {
        console.error('복사 실패:', err);
        showStatus('텍스트 복사에 실패했습니다.', 'error');
      }
    });

    // TXT 저장 버튼 클릭 이벤트
    saveBtn.addEventListener('click', () => {
      const ocrText = ocrResult.value;
      if (!ocrText || !selectedFile) return;

      const docType = currentAnalysis ? `${currentAnalysis.docType}로 보입니다.` : '미분류';
      const summary = currentAnalysis ? currentAnalysis.summary : '요약 정보 없음';

      const fileContent = `==================================================
AI 모바일 문서 스캐너 결과 보고서
==================================================

[1. 문서 정보]
- 파일명: ${selectedFile.name}
- 스캔 일시: ${new Date().toLocaleString('ko-KR')}

[2. AI 분석 결과]
- 문서 종류: ${docType}
- 요약 내용: ${summary}

==================================================
[3. 추출 텍스트]
==================================================
${ocrText}
==================================================`;

      const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8;' });
      
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const date = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      const formattedDate = `${year}${month}${date}_${hours}${minutes}${seconds}`;
      const fileName = `scan_result_${formattedDate}.txt`;

      const link = document.createElement('a');
      if (link.download !== undefined) {
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', fileName);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        showStatus(`💾 결과 파일이 '다운로드' 폴더에 성공적으로 저장되었습니다!`, 'success');
      }
    });

    function resetUploadButton() {
      uploadBtn.disabled = false;
      uploadBtn.innerHTML = '<span>📤 사진 업로드 및 분석하기</span>';
    }

    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = `status-msg status-${type}`;
      statusMessage.style.display = 'block';
    }

    function hideStatus() {
      statusMessage.style.display = 'none';
    }
  </script>
</body>
</html>
